<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{appName}}</title>
  <style type="text/css">
    /* Outlook.com-specific reset */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    table { border-collapse: collapse !important; }
    body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; background-color: #f4f4f5; }

    /* Custom Styles */
    .content-table { max-width: 600px !important; width: 100%; }
    .footer-text p { margin: 10px 0; }
    
    @media screen and (max-width: 600px) {
      .mobile-padding { padding: 20px !important; }
      .content-table { width: 95% !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0;">
  <table border="0" cellpadding="0" cellspacing="0" width="100%" bgcolor="#f4f4f5">
    <tr>
      <td align="center" style="padding: 20px 0 20px 0;">
        <!-- Container Table -->
        <table class="content-table" border="0" cellpadding="0" cellspacing="0" width="600" style="border-collapse: collapse; background-color: #ffffff; border-radius: 8px; overflow: hidden;">
          
          <!-- Header -->
          <tr>
            <td align="center" bgcolor="#4f46e5" style="padding: 30px 20px 30px 20px; color: #ffffff; font-family: Arial, sans-serif;">
              <h1 style="font-size: 24px; margin: 0; letter-spacing: -1px;">{{appName}}</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td class="mobile-padding" style="padding: 40px 30px 40px 30px; color: #374151; font-family: Arial, sans-serif; font-size: 16px; line-height: 24px;">
              {{{body}}}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" bgcolor="#fcfcfd" style="padding: 40px 20px; border-top: 1px solid #f3f4f6; color: #9ca3af; font-family: Arial, sans-serif; font-size: 12px; line-height: 18px;">
              <p style="margin: 0; font-weight: bold; color: #4f46e5; font-size: 14px; margin-bottom: 10px;">{{appName}}</p>
              <div class="footer-text">
                <p>&copy; {{year}} {{appName}}. All rights reserved.</p>
                <p>Sent to you by {{domainName}}.</p>
                <p>
                  <a href="{{support_url}}" style="color: #6b7280; text-decoration: underline;">Support</a> | 
                  <a href="{{unsubscribe_url}}" style="color: #6b7280; text-decoration: underline;">Unsubscribe</a>
                </p>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
